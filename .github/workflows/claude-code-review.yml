name: Claude PR Review

# ریویوی خودکار هر Pull Request توسط Claude.
# روی باز شدن PR و هر push جدید روی همان PR اجرا می‌شود.
on:
  pull_request:
    types: [opened, synchronize]

# جلوگیری از اجرای موازی روی یک PR (هر push قبلی را لغو می‌کند)
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # برای گذاشتن کامنت روی PR
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # کل تاریخچه، تا diff درست محاسبه شود

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Claude خودش CLAUDE.md پروژه را می‌خواند و قوانین را اعمال می‌کند.
          prompt: |
            تو ریویوئر کد پروژه‌ی آکادمی روح‌بخش هستی. این Pull Request را ریویو کن.
            قوانین پروژه در فایل‌های CLAUDE.md هست — حتماً بخوان و طبق آن‌ها ریویو کن.

            روی این موارد تمرکز کن و فقط نکات با اهمیت واقعی را کامنت بگذار:
            - باگ‌های منطقی و خطاهای احتمالی در زمان اجرا
            - مشکلات امنیتی (راز hard-code شده، نبود اعتبارسنجی ورودی، مسیر بدون guard)
            - نقض قرارداد: استفاده‌نکردن از تایپ‌های @roohbakhsh/shared یا تایپ تکراری محلی
            - متن قابل‌نمایشِ hard-code (باید Localized / i18n باشد)
            - نقض هویت بصری (رنگ خام به‌جای متغیرهای برند)
            - کد پیچیده یا تکراری که می‌شود ساده‌تر کرد

            برای هر نکته‌ی مشخص، کامنت inline روی همان خط بگذار.
            اگر همه‌چیز خوب بود، یک کامنت کوتاه تأیید بگذار. الکی ایراد نگیر.
            به فارسی کامنت بگذار.
          # ابزارهای لازم برای خواندن کد و گذاشتن کامنت روی PR
          claude_args: |
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment"
