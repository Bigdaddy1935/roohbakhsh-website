name: Claude Mention

# پاسخ‌گو به منشن @claude در کامنت‌ها و issueها.
# مثلاً یک نفر زیر PR بنویسد: "@claude این تابع چرا null برمی‌گرداند؟"
# یا: "@claude این باگ را درست کن" → Claude کد را اصلاح و push می‌کند.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  respond:
    # فقط وقتی واقعاً @claude منشن شده باشد اجرا شود
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write # تا بتواند برای رفع باگ کد push کند
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # بدون prompt → حالت تعاملی: به منشن @claude پاسخ می‌دهد.
          # CLAUDE.md پروژه خودکار خوانده می‌شود.
          claude_args: |
            --allowed-tools "Read,Grep,Glob,Edit,Write,Bash(git:*),Bash(pnpm:*)"
